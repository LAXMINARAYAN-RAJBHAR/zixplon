<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />

  <!-- ── Viewport: default for mobile, overridden for TV by script below ── -->
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover" />

  <!-- ── FIX 1: TV Browser viewport override (mobile stays untouched) ── -->
  <script>
    (function () {
      var ua = navigator.userAgent;
      var isTV = /TV|AndroidTV|HbbTV|SmartTV|SMART-TV|Tizen|WebOS/i.test(ua);
      // TV Browser on Android also lacks touch & has large screen
      var isTVBrowser = isTV || (
        /Android/i.test(ua) &&
        !('ontouchstart' in window) &&
        window.screen.width >= 1280
      );
      if (isTVBrowser) {
        var vp = document.querySelector('meta[name="viewport"]');
        if (vp) vp.setAttribute('content', 'width=1280, initial-scale=1');
      }
    })();
  </script>

  <meta name="theme-color" content="#000000" />

  <!-- ── Primary SEO ── -->
  <title>ZIXPLON - Watch Free Videos, Movies & Shorts Online</title>
  <meta name="description"
    content="zixplon is a free video streaming platform. Watch movies, shorts, music, news, comedy, gaming and more — all in one place." />

    content="zixplon, watch free videos, online streaming, free movies, shorts, music videos, Hindi movies, news, comedy, gaming" />
  <meta name="author" content="Laxminarayan Rajbhar" />

    content="Free video streaming platform. Watch movies, shorts, music, news and more for free on zixplon." />

    content="Free video streaming. Watch movies, shorts, music and more on zixplon." />
  <meta name="twitter:image" content="https://zixplon-tawny.vercel.app/logo192.png" />

  <!-- ── JSON-LD ── -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "zixplon",
    "url": "https://zixplon-tawny.vercel.app/",
    "description": "Free video streaming platform. Watch movies, shorts, music, news and more.",
    "potentialAction": {
      "@type": "SearchAction",
      "target": "https://zixplon-tawny.vercel.app/#/search?q={search_term_string}",
      "query-input": "required name=search_term_string"
    }
  }
  </script>

  <!-- ── Hash routing fix ── -->
  <script>!function (n) { if ("/" === n.search[1]) { var a = n.search.slice(1).split("&").map(function (n) { return n.replace(/~and~/g, "&") }).join("?"); window.history.replaceState(null, null, n.pathname.slice(0, -1) + a + n.hash) } }(window.location)</script>

  <!-- ── FIX 2: Mobile back-button exit — excluded Android TV / TV browsers ── -->
  <script>
    (function () {
      var ua = navigator.userAgent;
      // Exclude Smart TV / Android TV browsers so remote back button works normally
      var isTV = /TV|AndroidTV|HbbTV|SmartTV|SMART-TV|Tizen|WebOS/i.test(ua);
      if (isTV) return;
      if (!/Android|iPhone|iPad|iPod/i.test(ua)) return;

      // Push a sentinel entry on load so the first back press is catchable
      window.addEventListener('load', function () {
        window.history.pushState({ zixplonSentinel: true }, '', window.location.href);
      });
    })();
  </script>

  <!-- ── PWA ── -->
  <link rel="manifest" href="/manifest.json" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Zixplon" />
  <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />

  <!-- ── Google Analytics ── -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-5C06KXTS2F"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', 'G-5C06KXTS2F');
  </script>

  <!-- ── PWA Install Tracking ── -->
  <script>
    (function () {
      // Track when install prompt is shown
      window.addEventListener('beforeinstallprompt', function (e) {
        gtag('event', 'pwa_install_prompt_shown', {
          event_category: 'PWA',
          event_label: 'Install prompt shown to user',
        });
      });

      // Track when user actually installs the app
      window.addEventListener('appinstalled', function () {
        gtag('event', 'pwa_installed', {
          event_category: 'PWA',
          event_label: 'App installed successfully',
        });
      });

      // Track if user is already using as installed PWA
      if (window.matchMedia('(display-mode: standalone)').matches ||
          window.navigator.standalone === true) {
        gtag('event', 'pwa_launched', {
          event_category: 'PWA',
          event_label: 'Opened as installed PWA',
        });
      }
    })();
  </script>

  <!-- ── CRITICAL: black background before React loads ── -->
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      background-color: #000000;
      width: 100%;
      height: 100%;
      overflow-x: hidden;
    }

    #root {
      background-color: #000000;
      min-height: 100vh;
      width: 100%;
    }

    /* Pre-React native splash */
    #native-splash {
      position: fixed;
      inset: 0;
      background: #000000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 99999;
      transition: opacity 0.4s ease;
    }
    #native-splash.hide {
      opacity: 0;
      pointer-events: none;
    }
    #native-splash svg {
      width: min(45vw, 180px);
      height: min(45vw, 180px);
      animation: splashPop 0.45s cubic-bezier(0.175,0.885,0.32,1.275) forwards;
    }
    #native-splash p {
      margin-top: 20px;
      color: #ffffff;
      font-size: clamp(18px, 5vw, 28px);
      font-weight: 800;
      font-family: -apple-system, 'Outfit', 'Nunito', sans-serif;
      letter-spacing: clamp(4px, 1.5vw, 8px);
      text-transform: uppercase;
      opacity: 0.95;
      animation: splashFadeUp 0.45s ease 0.2s both;
    }
    .splash-dots {
      display: flex;
      gap: 8px;
      margin-top: clamp(28px, 8vw, 44px);
    }
    .splash-dot {
      width: clamp(6px, 2vw, 9px);
      height: clamp(6px, 2vw, 9px);
      border-radius: 50%;
      background: #CC0000;
    }
    .splash-dot:nth-child(1) { animation: splashBounce 1s ease-in-out 0s   infinite; }
    .splash-dot:nth-child(2) { animation: splashBounce 1s ease-in-out 0.18s infinite; }
    .splash-dot:nth-child(3) { animation: splashBounce 1s ease-in-out 0.36s infinite; }

    @keyframes splashPop {
      0%   { transform: scale(0.6); opacity: 0; }
      100% { transform: scale(1);   opacity: 1; }
    }
    @keyframes splashFadeUp {
      0%   { transform: translateY(12px); opacity: 0;    }
      100% { transform: translateY(0);    opacity: 0.95; }
    }
    @keyframes splashBounce {
      0%,80%,100% { transform: scale(0.7); opacity: 0.4; }
      40%          { transform: scale(1.3); opacity: 1;   }
    }
  </style>
</head>

<body>
  <noscript>You need to enable JavaScript to run this app.</noscript>

  <!-- Native splash: shows instantly before React JS even downloads -->
  <div id="native-splash">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
      <rect x="0" y="0" width="512" height="512" rx="110" ry="110" fill="#CC0000"/>
      <rect x="0" y="0" width="512" height="260" rx="110" ry="110" fill="#E81515" opacity="0.55"/>
      <polygon points="108,108 404,108 404,178 220,334 404,334 404,404 108,404 108,334 292,178 108,178" fill="#FFFFFF"/>
    </svg>
    <p>ZIXPLON</p>
    <div class="splash-dots">
      <div class="splash-dot"></div>
      <div class="splash-dot"></div>
      <div class="splash-dot"></div>
    </div>
  </div>

  <div id="root"></div>

  <!-- FIX 3: Hide native splash — added 5s timeout fallback for TV Browser -->
  <script>
    (function () {
      var splash = document.getElementById('native-splash');
      var removed = false;

      function hideSplash() {
        if (removed) return;
        removed = true;
        splash.classList.add('hide');
        setTimeout(function () {
          if (splash.parentNode) splash.parentNode.removeChild(splash);
        }, 450);
        if (observer) observer.disconnect();
      }

      // Fallback: force-hide splash after 5 seconds (handles TV browsers where
      // MutationObserver may not fire correctly)
      setTimeout(hideSplash, 5000);

      var observer = new MutationObserver(function () {
        var root = document.getElementById('root');
        if (root && root.children.length > 0) {
          hideSplash();
        }
      });
      observer.observe(document.getElementById('root'), { childList: true, subtree: true });
    })();
  </script>

  <!-- ── FIX 4: TV-only JS error overlay (completely skipped on mobile) ── -->
  <script>
    (function () {
      var ua = navigator.userAgent;
      var isTV = /TV|AndroidTV|HbbTV|SmartTV|SMART-TV|Tizen|WebOS/i.test(ua);
      var isTVBrowser = isTV || (
        /Android/i.test(ua) &&
        !('ontouchstart' in window) &&
        window.screen.width >= 1280
      );
      if (!isTVBrowser) return; // ← mobile/desktop never enters this block

      window.onerror = function (msg, src, line) {
        var d = document.createElement('div');
        d.style.cssText = 'position:fixed;top:0;left:0;right:0;background:red;color:#fff;font-size:18px;padding:14px;z-index:999999;word-break:break-all;font-family:monospace;';
        d.textContent = 'JS ERROR: ' + msg + ' @ ' + src + ':' + line;
        document.body.appendChild(d);
      };

      window.addEventListener('unhandledrejection', function (e) {
        var d = document.createElement('div');
        d.style.cssText = 'position:fixed;top:60px;left:0;right:0;background:orange;color:#000;font-size:16px;padding:12px;z-index:999999;word-break:break-all;font-family:monospace;';
        d.textContent = 'PROMISE ERROR: ' + (e.reason && e.reason.message || String(e.reason));
        document.body.appendChild(d);
      });
    })();
  </script>

</body>

</html>
